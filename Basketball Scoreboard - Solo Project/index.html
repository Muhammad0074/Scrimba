<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basketball Scoreboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bree+Serif&family=Orbitron:wght@400..900&family=PT+Sans+Caption:wght@400;700&family=Pacifico&family=Righteous&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="Style.css" />
  </head>
  <body>
    <!-- container for dark background -->
    <div class="bg-container">
      <!-- container for elements except reset button -->
      <div class="container">
        <!-- container for guest elements -->
        <div class="guest-container">
          <h1>Guest</h1>
          <!-- score box for guest -->
          <div class="score-box">
            <span>0</span>
          </div>
          <!-- buttons container for guest -->
          <div class="buttons-container">
            <div class="btn-container">
              <button class="btn" id="guest-btn1">+1</button>
              <button class="btn" id="guest-btn2">+2</button>
              <button class="btn" id="guest-btn3">+3</button>
            </div>
          </div>
        </div>
        <div class="home-container">
          <h1>Home</h1>
          <!-- score box for guest -->
          <div class="score-box">
            <span>0</span>
          </div>
          <!-- buttons container for guest -->
          <div class="buttons-container">
            <div class="btn-container">
              <button class="btn" id="home-btn1">+1</button>
              <button class="btn" id="home-btn2">+2</button>
              <button class="btn" id="home-btn3">+3</button>
            </div>
          </div>
        </div>
      </div>
      <!-- reset button -->
      <div class="reset-btn">
        <button class="btn" id="reset-btn">Reset</button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
